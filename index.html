<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接口流量监控</title>
  <link rel="stylesheet" href="src/style.css">
  <script src="../base1/cockpit.js"></script>
</head>
<body>
  <div id="app">
    <!-- 顶部导航 -->
    <header class="top-bar">
      <div class="top-bar-left">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        <h1>接口流量监控</h1>
        <span class="badge" id="interface-count">0 接口</span>
      </div>
      <div class="top-bar-right">
        <div class="refresh-indicator">
          <div class="pulse-dot"></div>
          <span>实时监控中</span>
        </div>
        <button class="btn btn-icon" id="btn-refresh" title="手动刷新">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
        <button class="btn btn-icon" id="btn-settings" title="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 概览统计卡片 -->
    <section class="stats-overview">
      <div class="stat-card stat-total">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
        <div class="stat-info"><span class="stat-label">总接口数</span><span class="stat-value" id="stat-total">0</span></div>
      </div>
      <div class="stat-card stat-active">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <div class="stat-info"><span class="stat-label">活跃接口</span><span class="stat-value" id="stat-active">0</span></div>
      </div>
      <div class="stat-card stat-upload">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 11 12 6 7 11"/><line x1="12" y1="18" x2="12" y2="6"/></svg></div>
        <div class="stat-info"><span class="stat-label">总发送</span><span class="stat-value" id="stat-upload">0 B</span></div>
      </div>
      <div class="stat-card stat-download">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 13 12 18 17 13"/><line x1="12" y1="6" x2="12" y2="18"/></svg></div>
        <div class="stat-info"><span class="stat-label">总接收</span><span class="stat-value" id="stat-download">0 B</span></div>
      </div>
      <div class="stat-card stat-speed">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
        <div class="stat-info"><span class="stat-label">当前总速率</span><span class="stat-value" id="stat-speed">0 B/s</span></div>
      </div>
    </section>

    <!-- 流量趋势图 -->
    <section class="chart-section">
      <div class="section-header">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="section-icon">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          流量趋势
        </h2>
        <div class="chart-controls">
          <div class="time-range-group" id="chart-time-range"></div>
        </div>
      </div>
      <div class="chart-wrapper"><canvas id="traffic-chart"></canvas></div>
      <div class="chart-legend">
        <div class="legend-item"><span class="legend-color upload-color"></span><span>发送速率</span></div>
        <div class="legend-item"><span class="legend-color download-color"></span><span>接收速率</span></div>
      </div>
    </section>

    <!-- 接口统计表格 -->
    <section class="table-section">
      <div class="section-header">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="section-icon">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
          接口统计
        </h2>
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="搜索接口名称..." autocomplete="off">
        </div>
      </div>
      <div class="table-wrap">
        <table class="iface-table" id="iface-table">
          <thead>
            <tr>
              <th class="sortable filterable" data-sort="status" data-filter="status">
                <div class="th-inner">
                  <span>状态</span>
                  <div class="th-icons">
                    <svg class="sort-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4-4 4 4M4 10l4 4 4-4"/></svg>
                    <svg class="filter-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12M4 7h8M6 11h4"/></svg>
                  </div>
                </div>
                <div class="filter-dropdown" id="filter-status"></div>
              </th>
              <th class="sortable filterable" data-sort="name" data-filter="name">
                <div class="th-inner">
                  <span>接口名称</span>
                  <div class="th-icons">
                    <svg class="sort-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4-4 4 4M4 10l4 4 4-4"/></svg>
                    <svg class="filter-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12M4 7h8M6 11h4"/></svg>
                  </div>
                </div>
                <div class="filter-dropdown" id="filter-name"></div>
              </th>
              <th class="sortable filterable" data-sort="type" data-filter="type">
                <div class="th-inner">
                  <span>类型</span>
                  <div class="th-icons">
                    <svg class="sort-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4-4 4 4M4 10l4 4 4-4"/></svg>
                    <svg class="filter-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12M4 7h8M6 11h4"/></svg>
                  </div>
                </div>
                <div class="filter-dropdown" id="filter-type"></div>
              </th>
              <th class="sortable" data-sort="linkSpeed">
                <div class="th-inner">
                  <span>链接速率</span>
                  <div class="th-icons">
                    <svg class="sort-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4-4 4 4M4 10l4 4 4-4"/></svg>
                  </div>
                </div>
              </th>
              <th class="sortable" data-sort="txSpeed">
                <div class="th-inner">
                  <span>发送速率</span>
                  <div class="th-icons">
                    <svg class="sort-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4-4 4 4M4 10l4 4 4-4"/></svg>
                  </div>
                </div>
              </th>
              <th class="sortable" data-sort="rxSpeed">
                <div class="th-inner">
                  <span>接收速率</span>
                  <div class="th-icons">
                    <svg class="sort-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4-4 4 4M4 10l4 4 4-4"/></svg>
                  </div>
                </div>
              </th>
              <th class="sortable" data-sort="txBytes">
                <div class="th-inner">
                  <span>累计发送</span>
                  <div class="th-icons">
                    <svg class="sort-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4-4 4 4M4 10l4 4 4-4"/></svg>
                  </div>
                </div>
              </th>
              <th class="sortable" data-sort="rxBytes">
                <div class="th-inner">
                  <span>累计接收</span>
                  <div class="th-icons">
                    <svg class="sort-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4-4 4 4M4 10l4 4 4-4"/></svg>
                  </div>
                </div>
              </th>
              <th class="sortable" data-sort="totalBytes">
                <div class="th-inner">
                  <span>总流量</span>
                  <div class="th-icons">
                    <svg class="sort-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4-4 4 4M4 10l4 4 4-4"/></svg>
                  </div>
                </div>
              </th>
              <th><span>速率趋势</span></th>
            </tr>
          </thead>
          <tbody id="iface-tbody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="empty-state" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>没有找到匹配的接口</p>
      </div>
    </section>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modal-title">接口详情</h2>
          <button class="btn btn-icon modal-close" id="modal-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="detail-grid">
            <div class="detail-section"><h3>基本信息</h3><div class="detail-table" id="detail-basic"></div></div>
            <div class="detail-section"><h3>流量统计</h3><div class="detail-table" id="detail-stats"></div></div>
          </div>
          <div class="detail-section">
            <div class="section-header">
              <h3>历史流量</h3>
              <div class="time-range-group" id="detail-time-range"></div>
            </div>
            <div class="detail-chart-box"><canvas id="detail-chart"></canvas></div>
          </div>
          <div class="detail-section"><h3>实时速率 (60s)</h3><div class="detail-chart-box"><canvas id="detail-speed-chart"></canvas></div></div>
          <div class="detail-section" id="detail-wifi-section" style="display:none;">
            <h3>WiFi 信息</h3>
            <div class="detail-table" id="detail-wifi-info"></div>
            <h3 style="margin-top:12px;">附近网络</h3>
            <div class="wifi-scan-table" id="detail-wifi-scan"></div>
          </div>
          <div class="detail-section"><h3>错误与丢包</h3><div class="error-stats" id="detail-errors"></div></div>
        </div>
      </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settings-overlay">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h2>监控设置</h2>
          <button class="btn btn-icon modal-close" id="settings-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="setting-item"><label>刷新间隔</label><select id="setting-interval"><option value="1000" selected>1 秒</option><option value="2000">2 秒</option><option value="5000">5 秒</option><option value="10000">10 秒</option></select></div>
          <div class="setting-item"><label>流量单位</label><select id="setting-unit"><option value="auto" selected>自动</option><option value="1">B</option><option value="1024">KB</option><option value="1048576">MB</option></select></div>
          <div class="setting-item"><label>告警阈值 (MB/s)</label><input type="number" id="setting-threshold" value="100" min="1" max="10000"></div>
          <div class="setting-divider"><span>接口类型</span></div>
          <div class="setting-item"><label>回环</label><label class="toggle"><input type="checkbox" id="setting-loopback"><span class="toggle-slider"></span></label></div>
          <div class="setting-item"><label>绑定接口</label><label class="toggle"><input type="checkbox" id="setting-bond" checked><span class="toggle-slider"></span></label></div>
          <div class="setting-item"><label>VLAN 子接口</label><label class="toggle"><input type="checkbox" id="setting-vlan" checked><span class="toggle-slider"></span></label></div>
          <div class="setting-item"><label>网桥</label><label class="toggle"><input type="checkbox" id="setting-bridge" checked><span class="toggle-slider"></span></label></div>
          <div class="setting-item"><label>防火墙接口</label><label class="toggle"><input type="checkbox" id="setting-firewall" checked><span class="toggle-slider"></span></label></div>
          <div class="setting-item"><label>TAP/TUN</label><label class="toggle"><input type="checkbox" id="setting-tap" checked><span class="toggle-slider"></span></label></div>
          <div class="setting-item"><label>虚拟以太网</label><label class="toggle"><input type="checkbox" id="setting-veth" checked><span class="toggle-slider"></span></label></div>
          <div class="setting-item"><label>虚拟接口</label><label class="toggle"><input type="checkbox" id="setting-virtual" checked><span class="toggle-slider"></span></label></div>
        </div>
      </div>
    </div>
  </div>
  <script src="src/app.js"></script>
</body>
</html>
